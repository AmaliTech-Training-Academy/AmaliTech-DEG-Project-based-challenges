name: Deploy Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # github.repository is usually lowercase, but Docker requires lowercase names
  # so we will use a shell step to lowercase it if needed, or rely on github context.

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js to match our target environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install dependencies and execute test suite. 
      # Pipeline will stop here if tests fail.
      - name: Install dependencies and test
        run: |
          cd app
          npm install
          npm test

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the automatic GitHub token
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Create lowercase repository name for docker tag
      - name: Lowercase Repository Name
        id: repo_name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Build the Docker image and push it to GHCR, tagged with Git SHA
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Create lowercase repository name for docker tag access
      - name: Lowercase Repository Name
        id: repo_name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Connect to the VM via SSH, authenticate with GHCR, pull image, and restart container
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY_PASSWORD,REGISTRY_USER
          script: |
            # Login to GHCR to pull private images if needed
            echo "$REGISTRY_PASSWORD" | docker login ghcr.io -u "$REGISTRY_USER" --password-stdin
            
            # Pull the new image tagged with the current commit SHA
            docker pull $IMAGE_TAG
            
            # Stop and remove the old container if it exists
            docker stop kora-app || true
            docker rm kora-app || true
            
            # Run the newly pulled container, mapping port 80 to container port 3000
            docker run -d \
              --name kora-app \
              -p 80:3000 \
              --restart unless-stopped \
              -e PORT=3000 \
              $IMAGE_TAG
