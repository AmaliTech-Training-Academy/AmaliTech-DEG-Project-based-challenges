name: Deploy Kora App

on:
  push:
    branches:
      - main
      - devops-final-work

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: |
          cd dev-ops/DeployReady/app
          npm install

      # Run tests
      - name: Run tests
        run: |
          cd dev-ops/DeployReady/app
          npm test

  build_and_push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image
      - name: Build image
        run: |
          docker build -t ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }} ./dev-ops/DeployReady

      # Push Docker image
      - name: Push image
        run: |
          docker push ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }}

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # Deploy application to EC2 server
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            
            # Capture current image for potential rollback
            OLD_IMAGE=$(docker inspect --format='{{.Config.Image}}' kora-app 2>/dev/null || echo "")
            
            # Pull new image
            docker pull ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }}
            
            # Stop and remove existing container
            docker stop kora-app || true
            docker rm kora-app || true
            
            # Run new container
            docker run -d --name kora-app -p 80:3000 ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }}
            
            # Health check loop
            echo "Performing health check..."
            MAX_RETRIES=12
            COUNT=0
            HEALTHY=false
            
            while [ $COUNT -lt $MAX_RETRIES ]; do
              if curl -s http://localhost:80/health | grep -q '"status":"ok"'; then
                echo "Health check passed!"
                HEALTHY=true
                break
              fi
              COUNT=$((COUNT+1))
              echo "Health check failed ($COUNT/$MAX_RETRIES), retrying in 5s..."
              sleep 5
            done
            
            # Rollback if unhealthy
            if [ "$HEALTHY" = false ]; then
              echo "Health check failed after $MAX_RETRIES attempts. Rolling back..."
              docker stop kora-app || true
              docker rm kora-app || true
              
              if [ -n "$OLD_IMAGE" ]; then
                echo "Restoring previous image: $OLD_IMAGE"
                docker run -d --name kora-app -p 80:3000 $OLD_IMAGE
                echo "Rollback successful."
              else
                echo "No previous image found to rollback to."
              fi
              exit 1
            fi