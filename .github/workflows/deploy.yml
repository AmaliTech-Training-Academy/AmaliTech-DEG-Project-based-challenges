name: Deploy Kora App

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: |
          cd dev-ops/DeployReady/app
          npm install

      # Run tests
      - name: Run tests
        run: |
          cd dev-ops/DeployReady/app
          npm test

  build_and_push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image
      - name: Build image
        run: |
          docker build -t ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }} ./dev-ops/DeployReady

      # Push Docker image
      - name: Push image
        run: |
          docker push ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }}

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # Deploy application to EC2 server
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }}
            docker stop kora-app || true
            docker rm kora-app || true
            docker run -d --name kora-app -p 80:3000 ghcr.io/muhireyves250/amalitech-deg-project-based-challenges/kora-app:${{ github.sha }}