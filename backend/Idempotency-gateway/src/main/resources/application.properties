server.port=8080

# SQLite datasource
spring.datasource.url=jdbc:sqlite:./idempotency.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Run schema.sql on every startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Disable JPA entirely ? we use plain JdbcTemplate
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Idempotency settings
idempotency.ttl-minutes=1440
idempotency.poll-interval-ms=200
idempotency.max-wait-ms=10000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Fix SQLite concurrent access ? single connection prevents locking
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Logging
logging.level.com.finsafe=debug